services:
  sophia:
    build:
      context: .
      target: base
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sophia.rule=Host(`sophia.localhost`)"
      - "traefik.http.services.sophia.loadbalancer.server.port=80"
      # Route grace.localhost/auth0/* and /api/* to sophia
      - "traefik.http.routers.sophia-auth.rule=Host(`grace.localhost`) && PathPrefix(`/auth0`)"
      - "traefik.http.routers.sophia-auth.service=sophia"
      - "traefik.http.routers.sophia-api.rule=Host(`grace.localhost`) && PathPrefix(`/api`)"
      - "traefik.http.routers.sophia-api.service=sophia"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    volumes:
      - .:/code
      - /code/src/Sophia.Api/bin
      - /code/src/Sophia.Api/obj
      - /code/src/Sophia.Domain/bin
      - /code/src/Sophia.Domain/obj
      - /code/src/Sophia.Infrastructure/bin
      - /code/src/Sophia.Infrastructure/obj
      - /code/src/Sophia.Db/bin
      - /code/src/Sophia.Db/obj
    networks:
      - default
      - docker_default
    depends_on:
      db:
        condition: service_healthy
    command:
      [
        "dotnet",
        "watch",
        "--non-interactive",
        "run",
        "--project",
        "src/Sophia.Api",
        "--urls",
        "http://0.0.0.0:80",
      ]
  db:
    image: mysql:9.3
    volumes:
      - db-store:/var/lib/mysql
      - ./docker/db/init.sql:/docker-entrypoint-initdb.d/0.sql
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=sophia
    ports:
      - "3306:3306"
    networks:
      - default
    labels:
      - "traefik.enable=false"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db-store:

networks:
  docker_default:
    external: true
    name: docker_default
